<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Classic Decision Tree</title>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <style>
            body {
                margin: 0;
                padding: 20px;
                font-family: Arial, sans-serif;
                background: #f5f5f5;
            }
            #tree-container {
                width: 100%;
                height: 800px;
                background: white;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }
            .tooltip {
                position: absolute;
                padding: 10px;
                background: rgba(0, 0, 0, 0.8);
                color: white;
                border-radius: 4px;
                pointer-events: none;
                font-size: 12px;
                visibility: hidden;
                z-index: 1000;
                max-width: 300px;
            }
            .node circle {
                cursor: pointer;
            }
            .link {
                fill: none;
            }
        </style>
    </head>
    <body>
        <div id="tree-container"></div>
        <div class="tooltip"></div>
        <script src="script.js"></script>
    </body>
</html>
