<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Decision Tree Visualization - Classic & Blocks</title>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <style>
            body {
                margin: 0;
                padding: 20px;
                font-family: Arial, sans-serif;
                background: #f5f5f5;
            }
            .controls {
                display: flex;
                gap: 10px;
                margin-bottom: 15px;
                justify-content: center;
            }
            .btn {
                padding: 10px 24px;
                background: white;
                border: 2px solid #ddd;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                transition: all 0.3s ease;
            }
            .btn:hover {
                border-color: #999;
                transform: translateY(-1px);
            }
            .btn.active {
                background: #4a90e2;
                color: white;
                border-color: #4a90e2;
            }
            #tree-container {
                width: 100%;
                height: 800px;
                background: white;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                position: relative;
                overflow: hidden;
            }
            .tooltip {
                position: absolute;
                padding: 10px;
                background: rgba(0, 0, 0, 0.8);
                color: white;
                border-radius: 4px;
                pointer-events: none;
                font-size: 12px;
                visibility: hidden;
                z-index: 1000;
                max-width: 300px;
            }
            .node circle {
                cursor: pointer;
                transition: all 0.4s ease;
            }
            .node rect {
                cursor: pointer;
                stroke: #333;
                transition: all 0.4s ease;
            }
            .node-label {
                text-anchor: middle;
                dominant-baseline: middle;
                fill: #333;
                pointer-events: none;
                font-weight: 500;
            }
            .link {
                fill: none;
                transition: all 0.4s ease;
            }
        </style>
    </head>
    <body>
        <div class="controls">
            <button class="btn" id="btn-classic">Classical</button>
            <button class="btn active" id="btn-blocks">Blocks</button>
        </div>
        <div id="tree-container"></div>
        <div class="tooltip"></div>
        <script src="script.js"></script>
    </body>
</html>
